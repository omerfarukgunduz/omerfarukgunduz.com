<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim | Ömer Faruk Gündüz</title>
  <meta name="description" content="Ömer Faruk Gündüz ile iletişime geçin — proje, iş birliği ve sorularınız için iletişim formu." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#030712" />
  <link rel="canonical" href="https://omerfarukgunduz.com/iletisim.html" />
  <link rel="icon" type="image/png" href="/ofg.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background-color: #030712;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(139,92,246,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(14,165,233,0.08), transparent),
        radial-gradient(ellipse 50% 30% at 0% 80%, rgba(244,114,182,0.06), transparent);
    }

    .glass {
      background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      color: #f1f5f9;
      background: rgba(255,255,255,0.04);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder { color: #64748b; }

    .form-input:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
    }

    .form-input.error { border-color: #ef4444; }

    .error-message {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 4px;
      display: none;
    }

    .error-message.show { display: block; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 45%, #0ea5e9 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,58,237,0.45);
    }

    .btn-submit:active { transform: translateY(0); }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .success-message {
      background: rgba(16,185,129,0.12);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.25);
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 500;
      display: none;
    }

    .success-message.show { display: block; }

    .nav-link {
      color: #94a3b8;
      transition: color 0.2s ease;
    }

    .nav-link:hover { color: #f8fafc; }
  </style>
</head>
<body class="font-sans text-slate-200">

  <div class="mesh-bg" aria-hidden="true"></div>

  <header class="relative z-10 border-b border-white/[0.06] bg-[#030712]/80 backdrop-blur-xl">
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4 sm:px-8" aria-label="Ana menü">
      <a href="/" class="flex items-center gap-3 text-sm font-semibold tracking-tight sm:text-base" aria-label="Ömer Faruk Gündüz — Ana sayfa">
        <img src="/ofg.png" alt="ÖFG logo" width="36" height="36" class="h-9 w-9 rounded-full object-cover shadow-lg shadow-violet-500/25 ring-1 ring-white/10" />
        <span class="hidden sm:block text-slate-100">Ömer Faruk <span class="text-slate-400 font-normal">Gündüz</span></span>
        <span class="sm:hidden text-slate-100">ÖFG</span>
      </a>
      <a href="/" class="nav-link flex items-center gap-2 text-sm font-medium">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        Ana Sayfa
      </a>
    </nav>
  </header>

  <main class="relative z-10 flex min-h-[calc(100vh-73px)] items-center justify-center px-5 py-12 sm:px-8">
    <div class="glass w-full max-w-lg rounded-2xl p-8 sm:p-10">
      <p class="mb-2 text-xs font-semibold uppercase tracking-widest text-violet-400">İletişim</p>
      <h1 class="text-2xl font-bold text-white sm:text-3xl">Bize Ulaşın</h1>
      <p class="mt-2 mb-8 text-sm text-slate-400">Sorularınız için formu doldurun, en kısa sürede yanıt vereceğiz.</p>

      <div class="success-message" id="successMessage">
        Mesajınız başarıyla gönderildi!
      </div>

      <form id="contactForm" novalidate>
        <div class="mb-5">
          <label for="name" class="mb-1.5 block text-sm font-semibold text-slate-300">Ad Soyad *</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Adınız ve soyadınız" required>
          <span class="error-message" id="nameError">Lütfen adınızı girin.</span>
        </div>

        <div class="mb-5">
          <label for="email" class="mb-1.5 block text-sm font-semibold text-slate-300">E-posta *</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="ornek@email.com" required>
          <span class="error-message" id="emailError">Geçerli bir e-posta adresi girin.</span>
        </div>

        <div class="mb-5">
          <label for="subject" class="mb-1.5 block text-sm font-semibold text-slate-300">Konu</label>
          <input type="text" id="subject" name="subject" class="form-input" placeholder="Mesajınızın konusu">
        </div>

        <div class="mb-6">
          <label for="message" class="mb-1.5 block text-sm font-semibold text-slate-300">Mesaj *</label>
          <textarea id="message" name="message" class="form-input resize-y" style="min-height:120px" placeholder="Mesajınızı buraya yazın..." required></textarea>
          <span class="error-message" id="messageError">Lütfen mesajınızı yazın.</span>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Gönder</button>
      </form>
    </div>
  </main>

  <footer class="relative z-10 border-t border-white/[0.04] px-5 py-6 text-center sm:px-8">
    <p class="text-sm text-slate-500">© 2026 <span class="font-medium text-slate-300">Ömer Faruk Gündüz</span></p>
  </footer>

  <script>
    const API_KEY = "a3c9f510-731e-44a3-82d9-44e07be2789a";
    const API_URL = "https://formflow.omerfarukgunduz.com/api/forms/submit";

    const form = document.getElementById('contactForm');
    const successMessage = document.getElementById('successMessage');
    const submitBtn = document.getElementById('submitBtn');

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showError(fieldId, errorId, show) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(errorId);
      field.classList.toggle('error', show);
      error.classList.toggle('show', show);
      return !show;
    }

    function showSuccess(text) {
      successMessage.textContent = text;
      successMessage.style.background = 'rgba(16,185,129,0.12)';
      successMessage.style.color = '#6ee7b7';
      successMessage.style.borderColor = 'rgba(16,185,129,0.25)';
      successMessage.classList.add('show');
      setTimeout(() => successMessage.classList.remove('show'), 5000);
    }

    function showFail(text) {
      successMessage.textContent = text;
      successMessage.style.background = 'rgba(239,68,68,0.12)';
      successMessage.style.color = '#fca5a5';
      successMessage.style.borderColor = 'rgba(239,68,68,0.25)';
      successMessage.classList.add('show');
      setTimeout(() => successMessage.classList.remove('show'), 6000);
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('message').value.trim();

      let isValid = true;
      isValid = showError('name', 'nameError', !name) && isValid;
      isValid = showError('email', 'emailError', !validateEmail(email)) && isValid;
      isValid = showError('message', 'messageError', !message) && isValid;
      if (!isValid) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Gönderiliyor...';

      const messageContent = subject ? `Konu: ${subject}\n\n${message}` : message;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify({
            apiKey: API_KEY,
            senderName: name,
            senderEmail: email,
            messageContent: messageContent
          })
        });

        const data = await response.json();

        if (data.success) {
          showSuccess(data.message || 'Mesajınız başarıyla gönderildi!');
          form.reset();
        } else {
          showFail(data.message || 'Mesaj gönderilemedi.');
        }
      } catch (error) {
        showFail('Bağlantı hatası: ' + error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Gönder';
      }
    });
  </script>

</body>
</html>
